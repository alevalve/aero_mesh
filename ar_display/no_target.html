<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>AR Floating Mode - Camera Enabled</title>
<script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
<style>
body { margin: 0; overflow: hidden; font-family: sans-serif; }
#overlay {
  position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
  z-index: 100; color: white; background: rgba(0,0,0,0.6);
  padding: 10px 20px; border-radius: 20px; pointer-events: none;
}
#hint {
  position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.5); color: white; font-size: 24px; z-index: 999;
}
</style>
</head>
<body>

<div id="hint">Tap to place object</div>
<div id="overlay">Floating Mode: Object is in front of you</div>

<a-scene
  embedded
  arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
  renderer="logarithmicDepthBuffer: true; colorManagement: true;"
  vr-mode-ui="enabled: false"
>
  <a-assets>
    <a-asset-item id="model" src="{{MODEL_FILE}}?v={{TIMESTAMP}}"></a-asset-item>
  </a-assets>
  <a-entity camera look-controls></a-entity>
  <a-light type="ambient" intensity="0.7"></a-light>
  <a-light type="directional" position="1 2 1" intensity="0.8"></a-light>
  <a-entity
    id="container"
    position="0 1 -3"
    animation="property: rotation; to: 0 360 0; loop: true; dur: 15000; easing: linear"
  >
    <a-gltf-model src="#model" scale="1 1 1" shadow="receive: false"></a-gltf-model>
  </a-entity>
</a-scene>

<script>
  async function getPlacement() {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    const video  = document.createElement('video');
    video.srcObject = stream;
    await video.play();
  
    let taps = [];
    const hintEl = document.getElementById('hint');
    hintEl.innerText = "Tap the first point";
  
    // 1. Wait for exactly 2 taps
    await new Promise(resolve => {
      const handler = (e) => {
        let clientX = e.touches && e.touches.length > 0 ? e.touches[0].clientX : e.clientX;
        let clientY = e.touches && e.touches.length > 0 ? e.touches[0].clientY : e.clientY;
  
        // Map the screen tap to the video frame's resolution
        const tapX = (clientX / window.innerWidth) * video.videoWidth;
        const tapY = (clientY / window.innerHeight) * video.videoHeight;
        
        taps.push({ x: tapX, y: tapY });
  
        if (taps.length === 1) {
          hintEl.innerText = "Tap the second point";
        } else if (taps.length === 2) {
          document.removeEventListener('click', handler);
          document.removeEventListener('touchstart', handler);
          resolve();
        }
      };
      
      document.addEventListener('click', handler);
      document.addEventListener('touchstart', handler);
    });
  
    hintEl.innerText = "Calculating depth and distance...";
  
    // 2. Capture the video frame
    const canvas = Object.assign(document.createElement('canvas'), { width: video.videoWidth, height: video.videoHeight });
    canvas.getContext('2d').drawImage(video, 0, 0);
    stream.getTracks().forEach(t => t.stop());
    const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg'));
  
    // 3. Prepare the data to send to Python
    const form = new FormData();
    form.append('frame', blob, 'frame.jpg');
    
    // THIS IS THE LINE FIXING YOUR ERROR! 
    // It converts the array of 2 taps into a JSON string and sends it to Python
    form.append('touches', JSON.stringify(taps)); 
  
    // 4. Send the request
    try {
      const response = await fetch('/estimate-placement', { method: 'POST', body: form });
      const pos = await response.json();
      
      hintEl.style.display = 'none';
  
      // Check if the backend sent back an error from the metrics function
      if (pos.metrics && pos.metrics.error) {
        console.error(pos.metrics.error);
        document.getElementById('overlay').innerText = pos.metrics.error;
        return;
      }
      
      // Display the distance to the user
      const overlay = document.getElementById('overlay');
      if (pos.metrics) {
          overlay.innerText = `Distance: ${pos.metrics.meters.toFixed(2)}m (${pos.metrics.inches.toFixed(1)} in)`;
      }
      
      // Place the object at the calculated 3D midpoint
      document.getElementById('container').setAttribute('position', `${pos.x} ${pos.y} ${-pos.z}`);
      
    } catch (error) {
      console.error("Error fetching placement:", error);
      hintEl.innerText = "Error calculating placement. Refresh to try again.";
    }
  }
  
  getPlacement();
  </script>
</body>
</html>
